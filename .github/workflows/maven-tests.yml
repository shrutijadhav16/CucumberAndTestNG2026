name: Cucumber TestNG Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run tests daily at 9 AM UTC
    - cron: '0 9 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['17']
    
    env:
      CHROME_BIN: /usr/bin/chromium-browser
      DISPLAY: :99
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromium-browser --version
          chromedriver --version

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run Cucumber Tests
        run: mvn test -Dsurefire.suiteXmlFiles=testng.xml

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-test-reports
          path: |
            target/cucumber-reports.html
            target/cucumber-reports.json
            target/surefire-reports/

      - name: Publish TestNG Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: TestNG Test Report
          path: 'target/surefire-reports/TEST-*.xml'
          reporter: 'java-testng'
          fail-on-error: false

      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'target/surefire-reports/TEST-runner.Runner.xml';
            if (fs.existsSync(path)) {
              const content = fs.readFileSync(path, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Tests completed! Check the artifacts for detailed reports.'
              });
            }
