name: Cucumber Tests with Chrome

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      chrome:
        image: chromium-browser:latest
        options: --no-sandbox --disable-dev-shm-usage
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Build project
        run: mvn clean install -DskipTests

      - name: Run Cucumber Tests in Parallel
        run: mvn test -Dsurefire.suiteXmlFiles=testng.xml -Dthread-count=4

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/cucumber-reports.html
            target/cucumber-reports.json
            target/surefire-reports/
          retention-days: 30

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Cucumber Test Results
          path: 'target/surefire-reports/TEST-*.xml'
          reporter: 'java-testng'
          fail-on-error: false
